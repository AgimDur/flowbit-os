Section "Device"
    Identifier "Default"
    Driver "modesetting"
EndSection

Section "Screen"
    Identifier "DefaultScreen"
    Device "Default"
    DefaultDepth 24
    SubSection "Display"
        Depth 24
        Virtual 3840 2160
    EndSubSection
EndSection

Section "ServerFlags"
    Option "AutoAddGPU" "false"
    Option "DontVTSwitch" "false"
    Option "AllowEmptyInput" "true"
EndSection
